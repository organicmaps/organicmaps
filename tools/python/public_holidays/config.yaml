output:
  data: "${OM_DATA_DIR}/generator/public_holidays/"
  sources:
    - libs_public_holidays_hpp:
        template: "${TEMPLATES_DIR}/libs_public_holidays.hpp.jinja2"
        output: "${OM_ROOT_DIR}/libs/public_holidays/holidays.hpp"
    - libs_public_holidays_cpp:
        template: "${TEMPLATES_DIR}/libs_public_holidays.cpp.jinja2"
        output: "${OM_ROOT_DIR}/libs/public_holidays/holidays.cpp"
    - android_public_holidays_java:
        template: "${TEMPLATES_DIR}/android_public_holidays.java.jinja2"
        output: "${OM_ROOT_DIR}/android/sdk/src/main/java/app/organicmaps/sdk/publicholidays/Holiday.java"
    - android_public_holidays_cpp:
        template: "${TEMPLATES_DIR}/android_public_holidays.cpp.jinja2"
        output: "${OM_ROOT_DIR}/android/sdk/src/main/cpp/app/organicmaps/sdk/publicholidays/Holiday.cpp"

