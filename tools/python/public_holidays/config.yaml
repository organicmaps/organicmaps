env:
  OM_ROOT_DIR: "../../.."
  OM_DATA_DIR: "${OM_ROOT_DIR}/data"
  TEMPLATES_DIR: "./templates"

input:
  metadata: "${OM_DATA_DIR}/countries_meta.txt"
  generation-years:
    - 2026
    - 2027
  holiday-types:
    - Public
    - Bank

twine:
  path: "${OM_DATA_DIR}/strings/public_holidays.txt"
