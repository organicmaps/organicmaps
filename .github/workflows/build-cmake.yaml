name: CMake

on:
  workflow_dispatch: # Manual trigger
  push:
    branches:
      - master
  pull_request:
    paths-ignore:
      - .gitignore
      - .github/**
      - '!.github/workflows/build-cmake.yaml'  # Run check on self change
      - CONTRIBUTORS
      - LICENSE
      - NOTICE
      - README.md
      - android/**
      - iphone/**
      - data/countries-strings/**
      - data/organic_maps_emoji/**
      - data/sound-strings/**
      - data/strings/**
      - docs/**
      - packaging/**
      - tools/**
      - '!tools/python/test_server/**'
      - xcode/**

# Cancels previous jobs if the same branch or PR was updated again.
# Only cancel PR runs: master runs must finish to populate the shared ccache.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        cmake-build-type: [ Debug, Release ]
        environment:
          - os: ubuntu-24.04
            cc: clang-19
            cxx: clang++-19
            unity: OFF
            run-tests: OFF

          - os: ubuntu-24.04
            cc: clang-19
            cxx: clang++-19

          - os: ubuntu-24.04
            cc: gcc-14
            cxx: g++-14

          - os: ubuntu-24.04
            cc: gcc-13
            cxx: g++-13

          - os: macos-26
            cc: clang
            cxx: clang++
            developer-dir: /Applications/Xcode_26.5.app/Contents/Developer
        exclude:
          - environment: { unity: OFF }
            cmake-build-type: Release

    name: "${{ matrix.environment.os }} ${{ matrix.environment.cc }} ${{ matrix.cmake-build-type }}${{ matrix.environment.unity == 'OFF' && ' No Unity' || '' }}"

    runs-on: ${{ matrix.environment.os }}

    env:
      DEVELOPER_DIR: ${{ matrix.environment.developer-dir }}

    steps:
      - name: Free disk space by removing .NET, Android and Haskell
        if: ${{ runner.os == 'Linux' }}
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc

      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Cache Boost submodule
        uses: ./.github/actions/cache-boost

      - name: Parallel submodules checkout
        run: git submodule update --depth 1 --init --recursive --jobs=20

      - name: Install build tools and dependencies (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt update -y
          sudo apt install -y \
              clang-19 \
              libgl1-mesa-dev \
              libglvnd-dev \
              libharfbuzz-dev \
              libqt6svg6-dev \
              libxcursor-dev \
              libxi-dev \
              libxinerama-dev \
              libxrandr-dev \
              ninja-build \
              qt6-base-dev \
              qt6-positioning-dev \

      - name: Install build tools and dependencies (macOS)
        if: ${{ runner.os == 'macOS' }}
        env:
          HOMEBREW_NO_ANALYTICS: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          brew install qt@6
          pip3 install tornado --break-system-packages

      - name: Configure repository
        run: ./configure.sh

      - name: Configure ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.workflow }}-${{ matrix.environment.os }}-${{ matrix.environment.cc }}-${{ matrix.environment.unity }}-${{ matrix.cmake-build-type }}
          # No Unity compiles every TU separately, so its cache needs more room
          # than the 500M default (max-size is a ceiling, not a reservation).
          max-size: ${{ matrix.environment.unity == 'OFF' && '2G' || '1G' }}
          # Restore-only on PRs: master populates the shared cache, PRs read it.
          # Avoids overflowing the 10GB repo limit, which evicts master's caches.
          save: ${{ github.ref == 'refs/heads/master' }}

      - name: Configure cmake
        env:
          CC: ${{ matrix.environment.cc }}
          CXX: ${{ matrix.environment.cxx }}
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
          UNITY_BUILD: ${{ matrix.environment.unity || 'ON' }}
        run: |
          cmake --preset ci \
            -DCMAKE_BUILD_TYPE=${{ matrix.cmake-build-type }} \
            -DCMAKE_UNITY_BUILD=${UNITY_BUILD}

      # Surface gcc/clang warnings and errors as inline annotations on the PR diff.
      - name: Enable inline compiler annotations
        run: echo "::add-matcher::.github/problem-matchers/gcc.json"

      - name: Compile
        run: cmake --build --preset ci

      - name: Prepare testing environment (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo locale-gen en_US
          sudo locale-gen en_US.UTF-8
          sudo locale-gen es_ES
          sudo locale-gen es_ES.UTF-8
          sudo locale-gen fr_FR
          sudo locale-gen fr_FR.UTF-8
          sudo locale-gen ru_RU
          sudo locale-gen ru_RU.UTF-8
          sudo update-locale

      # The omim-test label filter and the exclude list live in CMakePresets.json
      # (test preset "ci"). Excluded suites and why:
      #   drape_tests, drape_frontend_tests, shaders_tests - need offscreen GL, run in the next step
      #   generator_integration_tests - https://github.com/organicmaps/organicmaps/issues/225
      #   opening_hours_integration_tests - https://github.com/organicmaps/organicmaps/issues/219
      #   opening_hours_supported_features_tests - https://github.com/organicmaps/organicmaps/issues/219
      #   routing_integration_tests - https://github.com/organicmaps/organicmaps/issues/221
      #   world_feed_integration_tests - https://github.com/organicmaps/organicmaps/issues/215
      - name: Run tests
        if: ${{ matrix.environment.run-tests != 'OFF' }}
        run: ctest --preset ci -j$(nproc --all)

      # Run drape tests separately. They require offscreen rendering support.
      # The "ci-drape" test preset sets QT_QPA_PLATFORM=offscreen; setting it
      # globally breaks network tests on macOS.
      - name: Run drape tests
        if: ${{ matrix.environment.run-tests != 'OFF' }}
        run: ctest --preset ci-drape --verbose
