pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        google()
        mavenCentral()
        maven { url = 'https://www.jitpack.io' } // MPAndroidChart
    }
}
rootProject.name = 'Organic Maps'

include ':app'

include ':libs:api'
include ':libs:branding'
include ':libs:car'
include ':libs:downloader'
include ':libs:googleassistant'
include ':libs:routing'
include ':libs:utils'

include ':sdk'
include ':sdk:car'
include ':sdk:maps:world'
include ':sdk:widgets:lanes'
include ':sdk:widgets:speedlimit'
